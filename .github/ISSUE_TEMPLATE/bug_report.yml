name: Bug report
description: Report something that is not working as expected
title: "[Bug]: "
labels: ["type:bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: OptiCore version
      description: Run `pip show opticore` or check `pyproject.toml`
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System / Platform
      description: Include distribution and version where relevant
      options:
        - Linux (Ubuntu/Debian)
        - Linux (RHEL/Fedora/CentOS)
        - macOS
        - Windows
        - Python (pure, no OS dependency)
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Run `python --version`
      placeholder: e.g., 3.11.8
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is
      placeholder: |
        Briefly describe the bug
        ...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Exactly how to reproduce the bug.
        Code snippets and inputs are very helpful.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened instead
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: |
        Add any other context about the problem here, such as:
        - Full error message (run with `pytest -v` if a test failure)
        - Volatility and moneyness of the option (if pricing-related)
        - Any workarounds you've found
        - Dependencies: ib_async version, nanobind version, etc.
    validations:
      required: false

  - type: checkboxes
    id: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues and this has not been reported yet
          required: true
        - label: I can reproduce with a minimal, self-contained test case
          required: true