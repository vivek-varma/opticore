name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── C++ Tests ──────────────────────────────────────────────────────────
  cpp-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DOPTICORE_BUILD_TESTS=ON -DOPTICORE_BUILD_PYTHON=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Upload C++ test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-logs-${{ matrix.os }}
          path: |
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/LastTestsFailed.log
          if-no-files-found: ignore
          retention-days: 7

  # ── Python Tests ───────────────────────────────────────────────────────
  python-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nanobind scikit-build-core numpy pandas pytest

      - name: Build and install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/python/ -v --junitxml=pytest-results.xml

      - name: Type-check public API with mypy --strict (Issue #30)
        # Runs only on the canonical job — strict-mode mypy on the typing
        # smoke test catches any regression in the .pyi stubs (chain.pyi,
        # plot.pyi, __init__.pyi). The smoke test exercises every public
        # function so a missing/loose stub fails CI here.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: mypy --strict tests/python/typing/check_strict_api.py

      - name: Coverage report (gate at 85%)
        # Only run on the canonical job to keep cross-OS noise out of the
        # coverage badge / Codecov upload. Threshold is enforced in
        # pyproject.toml [tool.coverage.report] fail_under.
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          pytest tests/python/ --cov=opticore --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false  # don't fail CI if Codecov is flaky

      - name: Upload Python test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: pytest-results.xml
          if-no-files-found: ignore
          retention-days: 7

  # ── Code Quality ───────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: ruff check python/ tests/

      - name: Format check Python
        run: ruff format --check python/ tests/
