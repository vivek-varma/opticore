name: Release

# Build wheels + sdist on tag push, optionally dry-run to TestPyPI on manual
# workflow_dispatch. See RELEASING.md for the full flow.
#
# Tag push (v*):
#   → build_wheels (linux/macos/windows × cp310–cp313)
#   → build_sdist
#   → upload_release (attaches artifacts to the GitHub Release)
#   → publish_pypi (uploads to https://pypi.org/ via OIDC trusted publishing)
#
# workflow_dispatch with publish_to_testpypi=true:
#   → build_wheels, build_sdist as above
#   → publish_testpypi (uploads to https://test.pypi.org/)
#
# OIDC trusted publishing (no API token):
#   PyPI must have a "trusted publisher" registered for this repo first.
#   See RELEASING.md §0 for the one-time setup. The `id-token: write`
#   permission on the publish jobs is what lets PyPI verify the workflow's
#   identity without us shipping a long-lived secret.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Upload artifacts to TestPyPI after building"
        type: boolean
        default: false

jobs:
  # ── Wheels: cibuildwheel × 3 OSes × 4 Python versions ──────────────────────
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        # cibuildwheel reads [tool.cibuildwheel] from pyproject.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30

  # ── sdist: source distribution ──────────────────────────────────────────────
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ── GitHub Release: only on tag push ────────────────────────────────────────
  upload_release:
    name: Attach artifacts to GitHub Release
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/update the Release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}

  # ── TestPyPI: manual dry-run only ───────────────────────────────────────────
  publish_testpypi:
    name: Publish to TestPyPI (dry-run)
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_testpypi == true
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/opticore
    permissions:
      id-token: write   # OIDC trusted publishing — no API token needed
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true   # TestPyPI rejects re-uploads of the same version
          verbose: true

  # ── PyPI: real publish on tag push ─────────────────────────────────────────
  # Triggers automatically when a v* tag is pushed (after the dry-run on
  # TestPyPI has confirmed the wheel works). Uses OIDC trusted publishing —
  # see RELEASING.md §0 for the one-time PyPI configuration.
  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist, upload_release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/opticore
    permissions:
      id-token: write   # OIDC trusted publishing — no API token needed
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Sanity-check the dist directory
        run: |
          ls -la dist/
          # We expect 12 wheels + 1 sdist. Fail fast if the matrix dropped one.
          test "$(ls dist/*.whl 2>/dev/null | wc -l)" -ge 12 \
            || (echo "Expected ≥12 wheels, found $(ls dist/*.whl 2>/dev/null | wc -l)" && exit 1)
          test "$(ls dist/*.tar.gz 2>/dev/null | wc -l)" -eq 1 \
            || (echo "Expected exactly 1 sdist" && exit 1)

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # NO skip-existing: PyPI uploads are immutable; if this fires twice
          # for the same version it's a bug we want to know about.
          verbose: true
